                                                            <div className="bg-slate-900 border border-slate-800 p-2.5 rounded-lg">
                                                                <h5 className="text-[9px] font-bold text-slate-500 uppercase">Entrada (Inputs)</h5>
                                                                <p className="text-xs text-slate-300 mt-1 font-light leading-tight">{selectedElement.inputs}</p>
                                                            </div>
                                                            <div className="bg-slate-900 border border-slate-800 p-2.5 rounded-lg">
                                                                <h5 className="text-[9px] font-bold text-slate-500 uppercase">Salida (Outputs)</h5>
                                                                <p className="text-xs text-slate-300 mt-1 font-light leading-tight">{selectedElement.outputs}</p>
                                                            </div>
                                                        </div>

                                                        <div className="bg-slate-900/60 border border-slate-800 p-3 rounded-lg flex items-center gap-3">
                                                            {renderIcon('Clock', 'text-amber-400 text-lg')}
                                                            <div>
                                                                <h5 className="text-[9px] font-bold text-slate-500 uppercase">SLA Esperado</h5>
                                                                <p className="text-xs font-semibold text-slate-200">{selectedElement.sla}</p>
                                                            </div>
                                                        </div>

                                                        <div className="bg-slate-900/60 border border-slate-800 p-3 rounded-lg">
                                                            <h5 className="text-[9px] font-bold text-rose-400 uppercase">Riesgo Mitigado de Negocio</h5>
                                                            <p className="text-xs text-slate-300 mt-1 font-light leading-normal">{selectedElement.risk}</p>
                                                        </div>

                                                        <div className="pt-2">
                                                            <h5 className="text-[9px] font-bold text-slate-500 uppercase">Siguiente Paso Operativo</h5>
                                                            <p className="text-xs text-amber-400 font-medium mt-1">➔ {selectedElement.nextStep}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            
                                            {/* Si es del Pilar (Documento) */}
                                            {selectedElement.code && !selectedElement.fields && !selectedElement.objective && (
                                                <>
                                                    <h2 className="text-xl font-bold text-slate-100">{selectedElement.name}</h2>
                                                    <p className="text-sm text-slate-400 mt-2">{selectedElement.desc}</p>
                                                    
                                                    <div className="mt-6 space-y-3">
                                                        <h4 className="text-xs font-semibold text-slate-300 uppercase tracking-wider">Esquema de extracción IA (Campos Clave)</h4>
                                                        <div className="space-y-2">
                                                            {selectedElement.keyFields.map((field) => (
                                                                <div key={field} className="flex justify-between items-center bg-slate-900 border border-slate-800 p-2 rounded text-xs font-mono">
                                                                    <span className="text-amber-400">{field}</span>
                                                                    <span className="text-slate-500">string</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </>
                                            )}

                                            {/* Si es del Pipeline */}
                                            {selectedElement.tech && !selectedElement.objective && (
                                                <>
                                                    <h2 className="text-xl font-bold text-slate-100">{selectedElement.title}</h2>
                                                    <p className="text-sm text-slate-400 mt-2">{selectedElement.details.body}</p>
                                                    
                                                    <div className="mt-6 space-y-3">
                                                        <h4 className="text-xs font-semibold text-slate-300 uppercase tracking-wider">Código de Implementación / Prompt</h4>
                                                        <pre className="code-font bg-slate-900 border border-slate-800 p-3 rounded-lg text-[11px] text-slate-300 overflow-x-auto whitespace-pre">
                                                            {selectedElement.details.code}
                                                        </pre>
                                                    </div>
                                                </>
                                            )}

                                            {/* Si es una Tabla ERD */}
                                            {selectedElement.fields && !selectedElement.objective && (
                                                <>
                                                    <h2 className="text-xl font-mono font-bold text-amber-400 flex items-center gap-2">
                                                        {selectedElement.name}
                                                    </h2>
                                                    <p className="text-sm text-slate-400 mt-2">Especificaciones de persistencia en base de datos relacional para el almacenamiento de auditoría y gobernanza de pilares.</p>
                                                    
                                                    <div className="mt-6 space-y-3">
                                                        <h4 className="text-xs font-semibold text-slate-300 uppercase tracking-wider">DDL Estándar (SQL)</h4>
                                                        <pre className="code-font bg-slate-900 border border-slate-800 p-3 rounded-lg text-[11px] text-slate-300 overflow-x-auto whitespace-pre">
{`CREATE TABLE ${selectedElement.name} (
${selectedElement.fields.map(f => `  ${f.name.padEnd(25)} ${f.type.includes('PK') ? 'UUID PRIMARY KEY' : f.type.includes('FK') ? 'UUID REFERENCES ...' : f.type}`).join(',\n')}
);`}
                                                        </pre>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>

                                    {/* Footer Informativo */}
                                    <div className="pt-4 border-t border-slate-800 text-[10px] text-slate-500 mt-6">
                                        <p>La vista de negocio permite capacitar e inducir a los analistas operativos sobre cómo interactuar eficientemente con las sugerencias generadas por la inteligencia artificial en la obra.</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-6 text-center text-slate-500 my-auto">
                                    <p>Selecciona un elemento en el lienzo de trabajo para auditar la lógica y los datos.</p>
                                </div>
                            )}
                        </aside>
                    </div>
                </div>
            );
        }

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CanvasDashboard />);
    </script>
</body>
</html>
