services:
  db:
    image: postgres:16-alpine
    container_name: berisa-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?define POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?define POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - berisa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: berisa-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8081:8080"

  worker:
    build: ./backend
    container_name: berisa-worker
    command: npm run worker
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

  web:
    build: ./frontend
    container_name: berisa-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  berisa_pgdata:
