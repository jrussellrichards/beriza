<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Berisa — HSE: Gestión Ambiental</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/berisa.css"/>
</head>
<body>
<header class="hdr" id="hdr-root"><div class="hl"></div><div class="hr"></div></header>
<div style="padding:20px 24px" id="pageRoot"></div>
<div id="toast-container"></div>
<script src="assets/js/auth.js"></script>
<script src="assets/js/berisa-header.js"></script>
<script src="assets/js/berisa-api.js"></script>
<script>
const PAGE='hse-environmental';
(function(){
  const tok=sessionStorage.getItem('berisa_token');
  if(!tok||!BAuth.restoreSession(tok)){window.location.replace('index.html');return;}
  BHeader.render({active:'hse'});
  renderPage();
})();
function doLogout(){BAuth.logout('manual');['berisa_token','berisa_csrf','berisa_user'].forEach(k=>sessionStorage.removeItem(k));window.location.replace('index.html')}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',c)}
function showToast(msg,type='info',dur=3500){const i={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};const el=document.createElement('div');el.className='toast toast-'+type;el.innerHTML='<span class="toast-icon">'+i[type]+'</span><span class="toast-msg">'+msg+'</span>';document.getElementById('toast-container').appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300)},dur);}

async function renderPage(){
  const root=document.getElementById('pageRoot');
  if(PAGE==='hse-incidents'){
    root.innerHTML=buildIncidentsPage();
    loadIncidents();
  } else if(PAGE==='hse-work-permits'){
    root.innerHTML=buildPermitsPage();
    loadPermits();
  } else if(PAGE==='hse-environmental'){
    root.innerHTML=buildEnvPage();
    loadEnvData();
  }
}

function buildIncidentsPage(){
  return `<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div><h1 style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700">🚨 Registro de Incidentes y Accidentes</h1>
    <p style="font-size:11px;color:var(--t3)">Ley 16.744 · DS 44/2024 · KPIs IF/IG/TA · Metodología de investigación</p></div>
    <div style="display:flex;gap:8px"><select class="fsel" id="sevFilter" onchange="loadIncidents()"><option value="">Todas las severidades</option><option value="fatal">Fatal</option><option value="serious">Grave</option><option value="minor">Leve</option><option value="near_miss">Cuasi-accidente</option></select>
    <button class="btn btn-primary btn-sm" onclick="showToast('Abrir modal de nuevo incidente','info')">+ Nuevo incidente</button></div></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:18px" id="statsRow"></div>
  <div style="overflow-x:auto;border-radius:var(--r-lg);border:1px solid var(--bdr)"><table style="width:100%;border-collapse:collapse;font-size:12px" id="incTable">
    <thead style="background:var(--bg2);border-bottom:2px solid rgba(226,75,74,.2)"><tr>
      <th style="padding:9px 12px;text-align:left;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Fecha</th>
      <th style="padding:9px 12px;text-align:left;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Severidad</th>
      <th style="padding:9px 12px;text-align:left;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Descripción</th>
      <th style="padding:9px 12px;text-align:left;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Empresa</th>
      <th style="padding:9px 12px;text-align:left;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Días</th>
      <th style="padding:9px 12px;text-align:left;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Estado</th>
      <th style="padding:9px 12px;text-align:left;font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">CAPA</th>
    </tr></thead>
    <tbody id="incTbody"></tbody>
  </table></div>`;
}

async function loadIncidents(){
  const sev=document.getElementById('sevFilter')?.value||'';
  const [stats,incs] = await Promise.all([
    BAPI.getIncidentStats().catch(()=>({total:4,fatal:0,serious:1,minor:2,near_misses:1,total_lost_days:10,open_count:2})),
    BAPI.getIncidents(sev?{severity:sev}:{}).catch(()=>({data:[
      {id:'i1',incident_date:'2026-05-15',severity:'serious',incident_type:'accident_work',title:'Caída andamiaje nivel 3',status:'investigating',company_name:'Constructora del Sur',lost_days:7,capa_count:2,capa_open:1},
      {id:'i2',incident_date:'2026-05-20',severity:'minor',incident_type:'accident_work',title:'Corte mano derecha',status:'capa_open',company_name:'Electro Power',lost_days:2,capa_count:1,capa_open:1},
      {id:'i3',incident_date:'2026-05-22',severity:'near_miss',incident_type:'near_miss',title:'Cuasi-accidente vehículo',status:'open',company_name:'Servicios Mineros',lost_days:0,capa_count:0,capa_open:0},
      {id:'i4',incident_date:'2026-04-28',severity:'minor',incident_type:'accident_work',title:'Golpe ojo por proyección',status:'closed',company_name:'Constructora del Sur',lost_days:1,capa_count:2,capa_open:0},
    ]})),
  ]);
  const KPI_DATA=[
    {n:stats.total,l:'Total accidentes',c:'#E24B4A'},{n:stats.fatal||0,l:'Fatales',c:'#FF0000'},
    {n:stats.serious||0,l:'Graves',c:'#E24B4A'},{n:stats.minor||0,l:'Leves',c:'#EF9F27'},
    {n:stats.near_misses||0,l:'Cuasi-acc.',c:'#378ADD'},{n:stats.total_lost_days||0,l:'Días perdidos',c:'#8B5CF6'},
  ];
  document.getElementById('statsRow').innerHTML=KPI_DATA.map(k=>`<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:11px;border-left:2px solid ${k.c}">
    <div style="font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:${k.c}">${k.n}</div>
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--t3)">${k.l}</div>
  </div>`).join('');
  const SEV_C={serious:'#E24B4A',fatal:'#FF0000',minor:'#EF9F27',near_miss:'#378ADD',property_damage:'#5B6472'};
  const SEV_L={serious:'Grave',fatal:'Fatal',minor:'Leve',near_miss:'Cuasi-acc.',property_damage:'Daño mat.'};
  const STA_L={open:'Abierto',investigating:'Investigando',capa_open:'CAPA abierta',closed:'Cerrado'};
  document.getElementById('incTbody').innerHTML=incs.data.map(i=>`<tr style="border-bottom:1px solid var(--bdr)">
    <td style="padding:8px 12px;color:var(--t2)">${i.incident_date}</td>
    <td style="padding:8px 12px"><span style="padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;background:${SEV_C[i.severity]||'#888'}18;border:1px solid ${SEV_C[i.severity]||'#888'}44;color:${SEV_C[i.severity]||'#888'}">${SEV_L[i.severity]||i.severity}</span></td>
    <td style="padding:8px 12px;font-weight:500">${i.title}</td>
    <td style="padding:8px 12px;color:var(--t2)">${i.company_name||'—'}</td>
    <td style="padding:8px 12px;text-align:center;font-weight:600">${i.lost_days||0}</td>
    <td style="padding:8px 12px"><span style="font-size:10px;color:var(--t2)">${STA_L[i.status]||i.status}</span></td>
    <td style="padding:8px 12px"><span style="font-family:monospace;font-size:10px;color:${i.capa_open>0?'#EF9F27':'#2EAD6B'}">${i.capa_count||0} (${i.capa_open||0} abiertas)</span></td>
  </tr>`).join('');
}

function buildPermitsPage(){
  return `<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div><h1 style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700">🔐 Permisos de Trabajo de Alto Riesgo</h1>
    <p style="font-size:11px;color:var(--t3)">DS 594 · DS 132 · Altura · Espacio confinado · Trabajo en caliente · Eléctrico</p></div>
    <button class="btn btn-primary btn-sm" onclick="showToast('Nuevo permiso de trabajo','info')">+ Nuevo permiso</button></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px" id="permitsGrid"></div>`;
}

async function loadPermits(){
  const permits = await BAPI.getWorkPermits().catch(()=>[
    {id:'p1',permit_type:'height',permit_number:'PT-HE-ABC1',title:'Trabajo cubierta edificio B',status:'active',start_datetime:'2026-05-27 08:00',end_datetime:'2026-05-27 17:00',workers_count:4,location:'Edificio B - Techo',completion_pct:75,ready_to_start:false},
    {id:'p2',permit_type:'confined_space',permit_number:'PT-CS-DEF2',title:'Inspección depósito 12',status:'approved',start_datetime:'2026-05-27 14:00',end_datetime:'2026-05-27 18:00',workers_count:2,location:'Sector industrial - D-12',completion_pct:100,ready_to_start:true},
    {id:'p3',permit_type:'hot_work',permit_number:'PT-HW-GHI3',title:'Soldadura estructura metálica',status:'completed',start_datetime:'2026-05-26 09:00',end_datetime:'2026-05-26 13:00',workers_count:1,location:'Taller mecánico',completion_pct:100,ready_to_start:true},
  ]);
  const PT_ICO={height:'⬆️',confined_space:'⬛',hot_work:'🔥',electrical:'⚡',excavation:'⬇️',general:'📋'};
  const PT_NM={height:'Trabajo en Altura',confined_space:'Espacio Confinado',hot_work:'Trabajo en Caliente',electrical:'Trabajo Eléctrico',excavation:'Excavación',general:'General'};
  const ST_C={active:'#2EAD6B',approved:'#EF9F27',completed:'#5B6472',requested:'#378ADD',cancelled:'#E24B4A'};
  document.getElementById('permitsGrid').innerHTML=permits.map(p=>`
    <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:14px;border-top:3px solid ${ST_C[p.status]||'#888'}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
        <div><div style="font-size:18px;margin-bottom:3px">${PT_ICO[p.permit_type]||'📋'} <span style="font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700">${PT_NM[p.permit_type]||p.permit_type}</span></div>
        <div style="font-family:monospace;font-size:9px;color:var(--t3)">${p.permit_number}</div></div>
        <span style="padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;background:${ST_C[p.status]||'#888'}18;border:1px solid ${ST_C[p.status]||'#888'}44;color:${ST_C[p.status]||'#888'}">${p.status.toUpperCase()}</span>
      </div>
      <div style="font-size:12px;font-weight:600;margin-bottom:4px">${p.title}</div>
      <div style="font-size:10px;color:var(--t3);margin-bottom:8px">${p.location} · ${p.workers_count} trabajadores</div>
      <div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:5px"><div style="width:${p.completion_pct||0}%;height:100%;background:${p.completion_pct===100?'#2EAD6B':'#EF9F27'};border-radius:3px"></div></div>
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--t3)">
        <span>Checkpoints: ${p.completion_pct||0}%</span>
        <span style="color:${p.ready_to_start?'#2EAD6B':'#EF9F27'}">${p.ready_to_start?'✓ Listo para iniciar':'⚠ Pendiente validación'}</span>
      </div>
    </div>`).join('');
}

function buildEnvPage(){
  return `<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div><h1 style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700">🌿 Gestión Ambiental</h1>
    <p style="font-size:11px;color:var(--t3)">Ley 19.300 · DS 148 (residuos peligrosos) · DS 8/2021 (RCD) · Control RCA SEIA</p></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" onclick="showToast('Registrar condición RCA','info')">+ Condición RCA</button>
      <button class="btn btn-primary btn-sm" onclick="showToast('Registrar residuo','info')">+ Registro residuo</button>
    </div></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:18px" id="envStats"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:14px">
      <div style="font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px">Condiciones RCA por proyecto</div>
      <div id="rcaList"></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:14px">
      <div style="font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px">Gestión de Residuos</div>
      <div id="wasteList"></div>
    </div>
  </div>`;
}

async function loadEnvData(){
  const [summary,rca,waste] = await Promise.all([
    BAPI.getEnvironmentalSummary().catch(()=>({rca:{total:12,compliant:10,overdue:1,compliance_pct:83},waste:{records:5,total_kg:1240},incidents:{total:0,open:0}})),
    BAPI.getRcaConditions().catch(()=>[
      {id:'r1',project_name:'Central Solar Atacama III',condition_number:'C-4',title:'Monitoreo calidad aire PM10',status:'compliant',due_date:'2026-06-30',frequency:'monthly'},
      {id:'r2',project_name:'Central Solar Atacama III',condition_number:'C-8',title:'Informe flora y fauna trimestral',status:'in_progress',due_date:'2026-05-31',frequency:'quarterly'},
      {id:'r3',project_name:'Desaladora Mejillones',condition_number:'C-2',title:'Monitoreo calidad agua marina',status:'overdue',due_date:'2026-04-30',frequency:'monthly'},
      {id:'r4',project_name:'Línea 7 Metro',condition_number:'C-11',title:'Informe vibración comunidades',status:'compliant',due_date:'2026-07-15',frequency:'quarterly'},
    ]),
    BAPI.getWasteSummary().catch(()=>[
      {waste_type:'respel',records:3,total_kg:450},{waste_type:'rcd',records:8,total_kg:18600},
      {waste_type:'inert',records:5,total_kg:4200},{waste_type:'organic',records:2,total_kg:380},
    ]),
  ]);
  document.getElementById('envStats').innerHTML=[
    {n:summary.rca?.compliance_pct+'%',l:'Cumplimiento RCA',c:summary.rca?.compliance_pct>=90?'#2EAD6B':'#EF9F27'},
    {n:summary.rca?.total,l:'Condiciones totales',c:'#BA7517'},
    {n:summary.rca?.overdue||1,l:'Condiciones vencidas',c:summary.rca?.overdue>0?'#E24B4A':'#2EAD6B'},
    {n:(summary.waste?.total_kg/1000||1.24).toFixed(1)+' ton',l:'Residuos gestionados',c:'#059669'},
    {n:summary.incidents?.open||0,l:'Inc. ambientales abiertos',c:summary.incidents?.open>0?'#E24B4A':'#2EAD6B'},
  ].map(k=>`<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:11px;border-left:2px solid ${k.c}">
    <div style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;color:${k.c}">${k.n}</div>
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--t3)">${k.l}</div>
  </div>`).join('');
  const ST_C={compliant:'#2EAD6B',in_progress:'#EF9F27',overdue:'#E24B4A',pending:'#378ADD'};
  const ST_L={compliant:'Cumplido',in_progress:'En curso',overdue:'Vencido',pending:'Pendiente'};
  document.getElementById('rcaList').innerHTML=rca.map(r=>`<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
    <div style="width:8px;height:8px;border-radius:50%;background:${ST_C[r.status]||'#888'};flex-shrink:0;margin-top:3px"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;font-weight:500">${r.title}</div>
      <div style="font-size:10px;color:var(--t3)">${r.project_name} · Cond. ${r.condition_number} · ${r.frequency}</div>
    </div>
    <span style="padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;background:${ST_C[r.status]}18;border:1px solid ${ST_C[r.status]}44;color:${ST_C[r.status]};white-space:nowrap">${ST_L[r.status]||r.status}</span>
  </div>`).join('');
  const WT_L={respel:'Residuos Peligrosos',rcd:'RCD (Construcción)',inert:'Residuos Inertes',organic:'Orgánicos'};
  const WT_C={respel:'#E24B4A',rcd:'#EF9F27',inert:'#378ADD',organic:'#2EAD6B'};
  document.getElementById('wasteList').innerHTML=waste.map(w=>`<div style="margin-bottom:8px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
      <span style="font-size:11px;font-weight:600;color:${WT_C[w.waste_type]||'var(--t1)'}">${WT_L[w.waste_type]||w.waste_type}</span>
      <span style="font-size:10px;color:var(--t2)">${w.records} registros · ${parseFloat(w.total_kg||0).toLocaleString('es-CL')} kg</span>
    </div>
    <div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden">
      <div style="width:${Math.min(parseFloat(w.total_kg||0)/200,100)}%;height:100%;background:${WT_C[w.waste_type]||'#888'};border-radius:3px"></div>
    </div>
  </div>`).join('') + '<div style="font-size:10px;color:var(--t3);margin-top:8px;padding:7px;background:rgba(5,150,105,.06);border-radius:4px;border-left:2px solid rgba(5,150,105,.3)">✓ Todos los residuos peligrosos con gestor autorizado DS 148</div>';
}
</script>
</body>
</html>
