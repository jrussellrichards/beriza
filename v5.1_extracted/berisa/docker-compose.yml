version: '3.9'

# ═══════════════════════════════════════════════════════════
# BERISA Platform — Docker Compose (Development)
# Servicios: Backend, PostgreSQL, Redis, MinIO (S3 local)
# ═══════════════════════════════════════════════════════════

services:

  # ── BACKEND API ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: berisa_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:         development
      PORT:             4000
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_NAME:          berisa_db
      DB_USER:          berisa_user
      DB_PASSWORD:      berisa_dev_pass_2024
      REDIS_URL:        redis://redis:6379
      JWT_SECRET:       dev_jwt_secret_min_64_chars_change_in_production_now
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production_now
      FRONTEND_URL:     http://localhost:3000
      S3_BUCKET:        berisa-documents
      S3_REGION:        us-east-1
      S3_ENDPOINT:      http://minio:9000
      AWS_ACCESS_KEY_ID:     minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      SCRAPER_ENABLED:  "false"
      LOG_LEVEL:        info
      BCRYPT_ROUNDS:    "10"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - berisa_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FRONTEND (static files) ──────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    container_name: berisa_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - berisa_net

  # ── POSTGRESQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: berisa_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       berisa_db
      POSTGRES_USER:     berisa_user
      POSTGRES_PASSWORD: berisa_dev_pass_2024
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - berisa_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berisa_user -d berisa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: berisa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - berisa_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MINIO (S3-compatible local storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: berisa_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - berisa_net

networks:
  berisa_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
