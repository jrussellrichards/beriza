<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Berisa — Directorio de Proveedores</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/berisa.css"/>
<style>
.dir-page{padding:20px 24px}
.dir-toolbar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.dir-title{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;margin-bottom:3px}
.dir-sub{font-size:11px;color:var(--t3)}
/* Filter sidebar + grid layout */
.dir-layout{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
.dir-sidebar{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;position:sticky;top:70px}
.dir-sidebar-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.dir-filter-group{margin-bottom:14px}
.dir-filter-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:block}
.dir-check{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;font-size:11px;color:var(--t2)}
.dir-check input{accent-color:var(--gold)}
/* Supplier cards */
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.sup-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:16px;transition:var(--tr);cursor:pointer;position:relative;overflow:hidden}
.sup-card:hover{border-color:var(--bdh);box-shadow:var(--sh);transform:translateY(-1px)}
.sup-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.sup-logo{width:44px;height:44px;border-radius:8px;background:var(--bg3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.sup-logo img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.sup-info{flex:1;min-width:0}
.sup-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;line-height:1.2;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sup-type{font-size:10px;color:var(--t3)}
/* Level badges */
.level-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;position:absolute;top:12px;right:12px}
.lvl-0{background:rgba(91,100,114,.15);border:1px solid rgba(91,100,114,.3);color:var(--slate)}
.lvl-1{background:rgba(201,151,43,.12);border:1px solid rgba(201,151,43,.3);color:var(--gold)}
.lvl-2{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#3B82F6}
.lvl-3{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:#8B5CF6}
.lvl-4{background:rgba(46,173,107,.12);border:1px solid rgba(46,173,107,.3);color:#2EAD6B}
.sup-sectors{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.sup-sector-tag{background:var(--bg3);border:1px solid var(--bdr);color:var(--t3);padding:2px 7px;border-radius:20px;font-size:9px}
.sup-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.sup-stat{background:var(--bg3);border-radius:4px;padding:6px 8px;text-align:center}
.sup-stat .v{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--t1);display:block}
.sup-stat .l{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3)}
.sup-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--bdr)}
.sup-coverage{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px}
.sup-verified{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:#2EAD6B}
/* Stars rating */
.star-rating{display:flex;align-items:center;gap:2px;font-size:12px}
.star-rating .star{color:var(--gold);opacity:.25}
.star-rating .star.on{opacity:1}
/* Certifications */
.certs{display:flex;gap:4px;flex-wrap:wrap}
.cert{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:#60A5FA;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600}
/* Empty / loading */
.dir-empty{text-align:center;padding:48px;color:var(--t3);grid-column:1/-1}
.dir-empty .ei{font-size:48px;opacity:.2;margin-bottom:12px}
/* Pagination */
.dir-pager{display:flex;justify-content:center;align-items:center;gap:6px;padding:16px 0}
/* Comparison bar */
.compare-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:2px solid var(--gold);padding:10px 24px;display:flex;align-items:center;gap:12px;z-index:500;transform:translateY(100%);transition:transform .3s}
.compare-bar.show{transform:none}
.compare-items{display:flex;gap:8px;flex:1}
.compare-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:4px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:6px}
@media(max-width:900px){.dir-layout{grid-template-columns:1fr}.dir-sidebar{position:static}}
</style>
</head>
<body>
<header class="hdr" id="hdr-root"><div class="hl"></div><div class="hr"></div></header>

<main class="dir-page" role="main">
  <div class="dir-toolbar">
    <div>
      <div class="dir-title">Directorio de Proveedores</div>
      <div class="dir-sub">Proveedores homologados · Red de oferta BERISA · <span id="total-count">—</span> registrados</div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="supplier-onboarding.html" class="btn btn-primary btn-sm">+ Registrar proveedor</a>
    </div>
  </div>

  <div class="dir-layout">
    <!-- Sidebar filters -->
    <div class="dir-sidebar">
      <div class="dir-sidebar-title">Filtros</div>
      <input class="form-input" type="search" id="supSearch" placeholder="Buscar razón social…" oninput="applyFilters()" style="margin-bottom:12px"/>

      <div class="dir-filter-group">
        <span class="dir-filter-label">Nivel ICE</span>
        <label class="dir-check"><input type="checkbox" value="nivel_4" onchange="applyFilters()"> <span style="color:#2EAD6B">★★★★ Estratégico</span></label>
        <label class="dir-check"><input type="checkbox" value="nivel_3" onchange="applyFilters()"> <span style="color:#8B5CF6">★★★ Calificado</span></label>
        <label class="dir-check"><input type="checkbox" value="nivel_2" onchange="applyFilters()"> <span style="color:#3B82F6">★★ Básico</span></label>
        <label class="dir-check"><input type="checkbox" value="nivel_1" onchange="applyFilters()"> <span style="color:var(--gold)">★ Registrado</span></label>
      </div>

      <div class="dir-filter-group">
        <span class="dir-filter-label">Sector</span>
        <div id="sectorFilters"></div>
      </div>

      <div class="dir-filter-group">
        <span class="dir-filter-label">Región cobertura</span>
        <select class="fsel" id="regionFilter" onchange="applyFilters()" style="width:100%">
          <option value="">Todas</option>
          <option>Antofagasta</option><option>Metropolitana</option><option>Valparaíso</option>
          <option>Biobío</option><option>Tarapacá</option><option>Los Lagos</option>
        </select>
      </div>

      <div class="dir-filter-group">
        <span class="dir-filter-label">Ordenar por</span>
        <select class="fsel" id="sortFilter" onchange="applyFilters()" style="width:100%">
          <option value="level">Nivel ICE</option>
          <option value="rating">Mejor calificado</option>
          <option value="name">Nombre A→Z</option>
          <option value="jobs">Más trabajos</option>
        </select>
      </div>
      <button class="fbtn" style="width:100%;margin:0" onclick="resetFilters()">✕ Limpiar filtros</button>
    </div>

    <!-- Main grid -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <span class="fcnt">Mostrando <b id="showing-count">0</b> proveedores</span>
        <button class="cbtn" id="btnCompare" style="display:none" onclick="openComparison()">⚖ Comparar seleccionados</button>
      </div>
      <div class="dir-grid" id="supGrid"></div>
      <div class="dir-pager" id="pager"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <span>© <b>BERISA</b> · Directorio de Proveedores · <span id="footYear"></span></span>
  <span class="sec-ind"><div class="dot"></div>Sesión activa</span>
</footer>

<div class="compare-bar" id="compareBar">
  <div class="compare-items" id="compareItems"></div>
  <button class="btn btn-outline btn-sm" onclick="clearCompare()">Limpiar</button>
  <button class="btn btn-primary btn-sm" onclick="goCompare()">Comparar →</button>
</div>

<div id="toast-container"></div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/berisa-data.js"></script>
<script src="assets/js/berisa-api.js"></script>
<script src="assets/js/berisa-header.js"></script>
<script>
(function(){
  const tok=sessionStorage.getItem('berisa_token');
  if(!tok||!BAuth.restoreSession(tok)){window.location.replace('index.html');return;}
  if(BAuth.can('all'))BHeader.render({active:'supplier',showUsers:true});
  else BHeader.render({active:'supplier'});
})();
function doLogout(){BAuth.logout('manual');['berisa_token','berisa_csrf','berisa_user'].forEach(k=>sessionStorage.removeItem(k));window.location.replace('index.html')}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',c);const b=document.getElementById('thB');if(b)b.textContent=c==='dark'?'🌙':'☀️'}

// ── DEMO DATA (replace with API call in production) ──
const DEMO_SUPPLIERS = [
  {id:'s1',company_name:'Constructora del Sur S.A.',entity_type:'pj_nacional',sectors:['Infraestructura','Energía'],geo_coverage:['Biobío','Araucanía','Los Lagos'],homolog_level:'nivel_4',rating:4.8,jobs_completed:24,on_time_rate:96,certifications:['ISO 9001','ISO 45001'],description:'Empresa constructora con 20 años de experiencia en obras civiles y minería.',is_verified:true,logo_url:null},
  {id:'s2',company_name:'Tecnoelectro SpA',entity_type:'pj_nacional',sectors:['Energía'],geo_coverage:['Metropolitana','Valparaíso'],homolog_level:'nivel_3',rating:4.5,jobs_completed:18,on_time_rate:92,certifications:['ISO 9001'],description:'Especialistas en instalaciones eléctricas industriales de alta tensión.',is_verified:true,logo_url:null},
  {id:'s3',company_name:'Servicios Mineros del Norte',entity_type:'pj_nacional',sectors:['Minería'],geo_coverage:['Antofagasta','Tarapacá','Atacama'],homolog_level:'nivel_3',rating:4.2,jobs_completed:31,on_time_rate:88,certifications:['ISO 45001'],description:'Servicios especializados en perforación y tronaduras para la gran minería.',is_verified:false,logo_url:null},
  {id:'s4',company_name:'Ingeniería Hídrica Ltda.',entity_type:'pj_nacional',sectors:['Agua y Sanitaria'],geo_coverage:['Metropolitana','Coquimbo','Valparaíso'],homolog_level:'nivel_2',rating:4.0,jobs_completed:9,on_time_rate:91,certifications:['ISO 14001'],description:'Diseño y construcción de sistemas de agua potable y saneamiento.',is_verified:true,logo_url:null},
  {id:'s5',company_name:'Andina Edificaciones',entity_type:'pj_nacional',sectors:['Inmobiliario','Salud','Educación'],geo_coverage:['Metropolitana'],homolog_level:'nivel_2',rating:3.9,jobs_completed:7,on_time_rate:85,certifications:[],description:'Constructora de edificios habitacionales y de uso mixto en la Región Metropolitana.',is_verified:false,logo_url:null},
  {id:'s6',company_name:'Soluciones Ambientales Patagonia',entity_type:'pj_nacional',sectors:['Industrial','Agua y Sanitaria'],geo_coverage:['Aysén','Los Lagos','Magallanes'],homolog_level:'nivel_1',rating:null,jobs_completed:3,on_time_rate:null,certifications:[],description:'Empresa emergente en gestión de residuos y proyectos ambientales en la Patagonia.',is_verified:false,logo_url:null},
  {id:'s7',company_name:'Electro Power S.A.',entity_type:'pj_nacional',sectors:['Energía','Industrial'],geo_coverage:['Antofagasta','Tarapacá','Metropolitana'],homolog_level:'nivel_4',rating:4.9,jobs_completed:42,on_time_rate:98,certifications:['ISO 9001','ISO 45001','ISO 14001'],description:'Ingeniería y construcción de plantas de generación eléctrica fotovoltaica y termosolar.',is_verified:true,logo_url:null},
  {id:'s8',company_name:'Logística y Transporte Copec',entity_type:'pj_nacional',sectors:['Minería','Industrial'],geo_coverage:['Antofagasta','Tarapacá','Atacama','Metropolitana'],homolog_level:'nivel_3',rating:4.4,jobs_completed:55,on_time_rate:94,certifications:['ISO 9001'],description:'Transporte especializado de materiales y equipos para proyectos industriales y mineros.',is_verified:true,logo_url:null},
];

const SECTORS_AVAILABLE = [...new Set(DEMO_SUPPLIERS.flatMap(s=>s.sectors))].sort();
let compareList = [];
let filtered = [...DEMO_SUPPLIERS];
let curPage = 1;
const PAGE_SIZE = 6;

function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function levelMeta(lvl){
  const cfg={nivel_0:{cls:'lvl-0',icon:'○',label:'Pendiente'},nivel_1:{cls:'lvl-1',icon:'★',label:'Registrado'},nivel_2:{cls:'lvl-2',icon:'★★',label:'Básico'},nivel_3:{cls:'lvl-3',icon:'★★★',label:'Calificado'},nivel_4:{cls:'lvl-4',icon:'★★★★',label:'Estratégico'}};
  return cfg[lvl]||cfg.nivel_0;
}
function stars(rating){
  if(!rating)return'<span style="color:var(--t3);font-size:10px">Sin calificación</span>';
  const full=Math.floor(rating),half=rating%1>=0.5;
  let h='<div class="star-rating">';
  for(let i=0;i<5;i++)h+=`<span class="star ${i<full||(i===full&&half)?'on':''}">★</span>`;
  h+=`<span style="font-size:10px;color:var(--t2);margin-left:3px">${rating.toFixed(1)}</span></div>`;
  return h;
}

function renderSectorFilters(){
  document.getElementById('sectorFilters').innerHTML=SECTORS_AVAILABLE.map(s=>
    `<label class="dir-check"><input type="checkbox" value="${esc(s)}" onchange="applyFilters()"> ${esc(s)}</label>`
  ).join('');
}

function applyFilters(){
  const q=(document.getElementById('supSearch').value||'').toLowerCase();
  const checkedLevels=[...document.querySelectorAll('.dir-filter-group input[type=checkbox]:checked')].map(c=>c.value).filter(v=>v.startsWith('nivel'));
  const checkedSectors=[...document.querySelectorAll('.dir-filter-group input[type=checkbox]:checked')].map(c=>c.value).filter(v=>!v.startsWith('nivel'));
  const region=document.getElementById('regionFilter').value;
  const sort=document.getElementById('sortFilter').value;

  filtered=DEMO_SUPPLIERS.filter(s=>{
    if(q&&!s.company_name.toLowerCase().includes(q)&&!s.description.toLowerCase().includes(q))return false;
    if(checkedLevels.length&&!checkedLevels.includes(s.homolog_level))return false;
    if(checkedSectors.length&&!s.sectors.some(sc=>checkedSectors.includes(sc)))return false;
    if(region&&!s.geo_coverage.includes(region))return false;
    return true;
  });

  const sortFns={level:(a,b)=>['nivel_4','nivel_3','nivel_2','nivel_1','nivel_0'].indexOf(a.homolog_level)-['nivel_4','nivel_3','nivel_2','nivel_1','nivel_0'].indexOf(b.homolog_level),rating:(a,b)=>(b.rating||0)-(a.rating||0),name:(a,b)=>a.company_name.localeCompare(b.company_name,'es'),jobs:(a,b)=>(b.jobs_completed||0)-(a.jobs_completed||0)};
  filtered.sort(sortFns[sort]||sortFns.level);
  curPage=1;
  render();
}

function render(){
  const start=(curPage-1)*PAGE_SIZE;
  const page=filtered.slice(start,start+PAGE_SIZE);
  document.getElementById('showing-count').textContent=filtered.length;
  document.getElementById('total-count').textContent=DEMO_SUPPLIERS.length;

  const grid=document.getElementById('supGrid');
  if(!filtered.length){
    grid.innerHTML=`<div class="dir-empty"><div class="ei">🏭</div>Sin proveedores con esos criterios. <a href="supplier-onboarding.html">Registrar nuevo →</a></div>`;
    document.getElementById('pager').innerHTML='';return;
  }

  grid.innerHTML=page.map(s=>{
    const lm=levelMeta(s.homolog_level);
    const inCompare=compareList.includes(s.id);
    return`<div class="sup-card" onclick="openDetail('${s.id}')" tabindex="0">
      <span class="level-badge ${lm.cls}">${lm.icon} ${lm.label}</span>
      <div class="sup-card-top">
        <div class="sup-logo">${s.logo_url?`<img src="${esc(s.logo_url)}" alt="">`:'🏭'}</div>
        <div class="sup-info">
          <div class="sup-name" title="${esc(s.company_name)}">${esc(s.company_name)}</div>
          <div class="sup-type">${esc(s.entity_type?.replace('pj_','').replace('_',' '))||'—'}</div>
          ${stars(s.rating)}
        </div>
      </div>
      <div class="sup-sectors">${s.sectors.map(sc=>`<span class="sup-sector-tag">${esc(sc)}</span>`).join('')}</div>
      <div class="sup-stats">
        <div class="sup-stat"><span class="v">${s.jobs_completed||0}</span><span class="l">Trabajos</span></div>
        <div class="sup-stat"><span class="v">${s.on_time_rate?s.on_time_rate+'%':'—'}</span><span class="l">A tiempo</span></div>
        <div class="sup-stat"><span class="v">${s.certifications.length||0}</span><span class="l">Cert.</span></div>
      </div>
      ${s.certifications.length?`<div class="certs">${s.certifications.map(c=>`<span class="cert">${esc(c)}</span>`).join('')}</div>`:''}
      <div class="sup-footer">
        <div class="sup-coverage">📍 ${s.geo_coverage.slice(0,2).join(', ')}${s.geo_coverage.length>2?` +${s.geo_coverage.length-2}`:''}</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${s.is_verified?'<span class="sup-verified">✓ Verificado</span>':''}
          <button class="cbtn${inCompare?' hc':''}" onclick="event.stopPropagation();toggleCompare('${s.id}','${esc(s.company_name)}')">${inCompare?'✓ En comparar':'+ Comparar'}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  renderPager();
}

function renderPager(){
  const pages=Math.ceil(filtered.length/PAGE_SIZE);
  if(pages<=1){document.getElementById('pager').innerHTML='';return;}
  let h=`<button class="pgb" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=pages;i++)h+=`<button class="pgb${i===curPage?' on':''}" onclick="goPage(${i})">${i}</button>`;
  h+=`<button class="pgb" onclick="goPage(${curPage+1})" ${curPage===pages?'disabled':''}>›</button>`;
  document.getElementById('pager').innerHTML=h;
}
function goPage(p){curPage=p;render();window.scrollTo({top:0,behavior:'smooth'})}

function toggleCompare(id,name){
  const idx=compareList.indexOf(id);
  if(idx>=0)compareList.splice(idx,1);
  else{if(compareList.length>=4){showToast('Máximo 4 proveedores para comparar','warning');return;}compareList.push(id);}
  updateCompareBar();render();
}
function updateCompareBar(){
  const bar=document.getElementById('compareBar');
  const items=document.getElementById('compareItems');
  const btn=document.getElementById('btnCompare');
  if(!compareList.length){bar.classList.remove('show');btn.style.display='none';return;}
  bar.classList.add('show');btn.style.display='';
  items.innerHTML=compareList.map(id=>{
    const s=DEMO_SUPPLIERS.find(x=>x.id===id);
    return`<div class="compare-item"><span>${s?esc(s.company_name.slice(0,24)):'?'}</span><button style="background:none;border:none;color:var(--t3);cursor:pointer" onclick="toggleCompare('${id}','')">×</button></div>`;
  }).join('');
}
function clearCompare(){compareList=[];updateCompareBar();render()}
function goCompare(){showToast('Comparador en desarrollo — próximamente','info')}

function openDetail(id){
  const s=DEMO_SUPPLIERS.find(x=>x.id===id);
  if(!s)return;
  showToast(`Perfil: ${s.company_name}`,'info');
  // In production: navigate to supplier detail page or open modal
}
function resetFilters(){
  document.getElementById('supSearch').value='';
  document.getElementById('regionFilter').value='';
  document.getElementById('sortFilter').value='level';
  document.querySelectorAll('.dir-filter-group input[type=checkbox]').forEach(c=>c.checked=false);
  applyFilters();
}
function showToast(msg,type='info',dur=3000){
  const i={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  const el=document.createElement('div');el.className=`toast toast-${type}`;
  el.innerHTML=`<span class="toast-icon">${i[type]||'ℹ️'}</span><span class="toast-msg">${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300)},dur);
}
document.getElementById('footYear').textContent=new Date().getFullYear();
renderSectorFilters();applyFilters();
</script>
</body></html>
