<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Berisa — Registro de Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/berisa.css"/>
<style>
.onb-wrap{max-width:840px;margin:0 auto;padding:28px 24px}
/* Stepper */
.stepper{display:flex;align-items:center;margin-bottom:32px;gap:0}
.step-item{display:flex;align-items:center;flex:1}
.step-circle{width:36px;height:36px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--t3);background:var(--bg2);flex-shrink:0;transition:var(--tr);cursor:pointer}
.step-item.active .step-circle{border-color:var(--gold);color:var(--gold);background:rgba(201,151,43,.1)}
.step-item.done .step-circle{border-color:var(--success);color:#fff;background:var(--success)}
.step-label{font-size:10px;color:var(--t3);margin-left:8px;white-space:nowrap;font-weight:500;line-height:1.3}
.step-item.active .step-label{color:var(--gold)}
.step-item.done .step-label{color:var(--success)}
.step-connector{flex:1;height:2px;background:var(--bdr);margin:0 6px}
.step-connector.done{background:var(--success)}
/* Panel */
.onb-panel{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.onb-panel-hdr{background:var(--bg3);padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.onb-panel-icon{font-size:22px}
.onb-panel-title{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700}
.onb-panel-sub{font-size:11px;color:var(--t3)}
.onb-panel-body{padding:20px}
/* ICE level cards */
.ice-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.ice-card{background:var(--bg3);border:2px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:var(--tr);position:relative}
.ice-card:hover{border-color:var(--bdh)}
.ice-card.selected{border-color:var(--gold);background:rgba(201,151,43,.06)}
.ice-card .ico{font-size:28px;margin-bottom:8px}
.ice-card .name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.ice-card .desc{font-size:10px;color:var(--t3);line-height:1.4}
.ice-card .badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);padding:2px 10px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
/* Checklist */
.checklist{display:flex;flex-direction:column;gap:6px}
.check-item{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:10px 12px;display:flex;align-items:center;gap:10px;transition:var(--tr)}
.check-item.done{border-color:rgba(46,173,107,.3);background:rgba(46,173,107,.04)}
.check-item.pending{border-color:var(--bdr)}
.check-item.required::before{content:'*';color:var(--danger);font-size:12px;flex-shrink:0}
.check-status{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cs-done{background:rgba(46,173,107,.15);color:#2EAD6B}
.cs-pend{background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--t3)}
.check-text{flex:1;font-size:12px;font-weight:500}
.check-req{font-size:9px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.5px}
.check-opt{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.upload-btn{background:transparent;border:1px dashed var(--bdr);color:var(--gold);padding:4px 10px;border-radius:4px;font-size:10px;font-family:inherit;cursor:pointer;transition:var(--tr);flex-shrink:0}
.upload-btn:hover{border-color:var(--gold);background:rgba(201,151,43,.08)}
/* Progress ring */
.progress-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.progress-ring{width:80px;height:80px}
.progress-ring circle{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.progress-pct{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--gold)}
.progress-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
/* Form rows */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* Tag selector */
.tag-selector{display:flex;gap:6px;flex-wrap:wrap}
.tag-opt{padding:4px 12px;border-radius:20px;border:1px solid var(--bdr);font-size:11px;color:var(--t2);cursor:pointer;transition:var(--tr);background:transparent}
.tag-opt.on{border-color:var(--gold);color:var(--gold);background:rgba(201,151,43,.1)}
/* Nav buttons */
.onb-nav{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--bdr);margin-top:8px}
/* Save indicator */
.saving-ind{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.saving-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pls 2s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:600px){.fg2,.fg3{grid-template-columns:1fr}.stepper{overflow-x:auto}}
</style>
</head>
<body>
<header class="hdr" id="hdr-root"><div class="hl"></div><div class="hr"></div></header>

<main class="onb-wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:8px">
    <div>
      <h1 style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;margin-bottom:3px">Registro de Proveedor</h1>
      <p style="font-size:11px;color:var(--t3)">Complete su perfil para acceder al directorio BERISA y ser invitado a procesos de cotización</p>
    </div>
    <div class="saving-ind"><div class="saving-dot"></div>Guardado automático</div>
  </div>

  <!-- Stepper -->
  <div class="stepper" id="stepper"></div>

  <!-- Step panels -->
  <div id="step-content"></div>

  <!-- Navigation -->
  <div class="onb-nav">
    <button class="btn btn-outline" id="btnPrev" onclick="prevStep()">← Anterior</button>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="stepIndicator" style="font-size:11px;color:var(--t3)"></span>
      <button class="btn btn-primary" id="btnNext" onclick="nextStep()">Siguiente →</button>
    </div>
  </div>
</main>

<footer class="footer"><span>© <b>BERISA</b> · Registro Proveedores · <span id="footYear"></span></span></footer>
<div id="toast-container"></div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/berisa-header.js"></script>
<script>
(function(){
  const tok=sessionStorage.getItem('berisa_token');
  if(!tok||!BAuth.restoreSession(tok)){window.location.replace('index.html');return;}
  BHeader.render({active:'supplier'});
})();
function doLogout(){BAuth.logout('manual');['berisa_token','berisa_csrf','berisa_user'].forEach(k=>sessionStorage.removeItem(k));window.location.replace('index.html')}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',c)}

const STEPS=[
  {id:'info',     label:'Datos básicos',  icon:'🏢'},
  {id:'contact',  label:'Contacto',       icon:'👤'},
  {id:'coverage', label:'Cobertura',      icon:'🗺️'},
  {id:'ice',      label:'Nivel ICE',      icon:'⭐'},
  {id:'docs',     label:'Documentos',     icon:'📄'},
  {id:'review',   label:'Revisión',       icon:'✅'},
];
const ICE_LEVELS=[
  {id:'nivel_0',name:'Pendiente',ico:'⬜',desc:'Sólo registrado, sin documentación',color:'var(--slate)',badge:null},
  {id:'nivel_1',name:'Registrado',ico:'🟡',desc:'Datos básicos + RUT + TGR verificados',color:'var(--gold)',badge:'Acceso básico'},
  {id:'nivel_2',name:'Básico',    ico:'🔵',desc:'Balance + 2 referencias + RRHH declarado',color:'#3B82F6',badge:'Cotizaciones'},
  {id:'nivel_3',name:'Calificado',ico:'🟣',desc:'ISO 9001 + financiero auditado + banco',color:'#8B5CF6',badge:'Shortlists'},
  {id:'nivel_4',name:'Estratégico',ico:'🟢',desc:'Track record >USD 10M + ESG + digital',color:'#2EAD6B',badge:'Preferencial'},
];
const SECTORS=['Energía','Infraestructura','Minería','Industrial','Agua y Sanitaria','Transporte','Salud','Educación','Inmobiliario','Concesiones'];
const REGIONS=['Arica y Parinacota','Tarapacá','Antofagasta','Atacama','Coquimbo','Valparaíso','Metropolitana','O\'Higgins','Maule','Ñuble','Biobío','La Araucanía','Los Ríos','Los Lagos','Aysén','Magallanes'];
const DOCS_BY_LEVEL={
  nivel_1:[
    {key:'rut',label:'RUT / Personería Jurídica',required:true,done:false},
    {key:'escritura',label:'Escritura de Constitución',required:true,done:false},
    {key:'tgr',label:'Certificado TGR (sin deudas)',required:true,done:false},
    {key:'sii',label:'Inicio de Actividades SII',required:true,done:false},
  ],
  nivel_2:[
    {key:'balance',label:'Balance tributario último año',required:true,done:false},
    {key:'rrhh',label:'Declaración de dotación y capacidad',required:true,done:false},
    {key:'referencias',label:'Dos referencias de proyectos anteriores',required:true,done:false},
    {key:'seguros',label:'Certificado de seguros vigentes',required:false,done:false},
  ],
  nivel_3:[
    {key:'iso9001',label:'Certificado ISO 9001 vigente',required:true,done:false},
    {key:'ohsas',label:'Certificado ISO 45001 / OHSAS 18001',required:false,done:false},
    {key:'financiero',label:'Informe financiero auditado',required:true,done:false},
    {key:'banco',label:'Certificado bancario',required:true,done:false},
  ],
  nivel_4:[
    {key:'track_record',label:'Track record proyectos >USD 10M',required:true,done:false},
    {key:'esg',label:'Política ESG documentada',required:false,done:false},
  ],
};
let state={
  cur:0,
  form:{company_name:'',rut:'',entity_type:'pj_nacional',contact_name:'',contact_email:'',contact_phone:'',website:'',description:'',sectors:[],geo_coverage:[],employee_count:'',target_level:'nivel_1',docs:{}},
  docsDone:{},
};

function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function pct(){
  const allDocs=Object.values(DOCS_BY_LEVEL).flat();
  const done=allDocs.filter(d=>state.docsDone[d.key]).length;
  const filled=[state.form.company_name,state.form.contact_email,state.form.sectors.length,state.form.geo_coverage.length].filter(Boolean).length;
  return Math.round((done+filled)/(allDocs.length+4)*100);
}

function renderStepper(){
  document.getElementById('stepper').innerHTML=STEPS.map((s,i)=>{
    const done=i<state.cur, active=i===state.cur;
    return`<div class="step-item${active?' active':''}${done?' done':''}">
      <div class="step-circle" onclick="goStep(${i})">${done?'✓':(i+1)}</div>
      <div><div class="step-label">${s.icon} ${s.label}</div></div>
    </div>${i<STEPS.length-1?`<div class="step-connector${done?' done':''}"></div>`:''}`;
  }).join('');
  document.getElementById('stepIndicator').textContent=`${state.cur+1} de ${STEPS.length}`;
  document.getElementById('btnPrev').style.display=state.cur===0?'none':'';
  document.getElementById('btnNext').textContent=state.cur===STEPS.length-1?'Finalizar registro ✓':'Siguiente →';
}

function renderContent(){
  const s=STEPS[state.cur];
  const bodies={
    info: `<div class="onb-panel"><div class="onb-panel-hdr"><span class="onb-panel-icon">🏢</span><div><div class="onb-panel-title">Datos de la Empresa</div><div class="onb-panel-sub">Información básica de identificación</div></div></div>
      <div class="onb-panel-body">
        <div class="fg2">
          <div class="form-group"><label class="form-label">Razón Social *</label><input class="form-input" id="f_company" value="${esc(state.form.company_name)}" placeholder="Nombre legal de la empresa" oninput="state.form.company_name=this.value"/></div>
          <div class="form-group"><label class="form-label">RUT *</label><input class="form-input" id="f_rut" value="${esc(state.form.rut)}" placeholder="12.345.678-9" oninput="state.form.rut=this.value"/></div>
        </div>
        <div class="form-group"><label class="form-label">Tipo de Entidad</label>
          <select class="form-input form-select" onchange="state.form.entity_type=this.value">
            <option value="pj_nacional" ${state.form.entity_type==='pj_nacional'?'selected':''}>Persona Jurídica Nacional</option>
            <option value="pj_extranjero" ${state.form.entity_type==='pj_extranjero'?'selected':''}>Persona Jurídica Extranjera</option>
            <option value="pn" ${state.form.entity_type==='pn'?'selected':''}>Persona Natural</option>
            <option value="simplificada" ${state.form.entity_type==='simplificada'?'selected':''}>Contabilidad Simplificada</option>
          </select></div>
        <div class="form-group"><label class="form-label">Descripción de la empresa</label><textarea class="form-input" rows="3" placeholder="Especialidades, años de experiencia, proyectos destacados…" oninput="state.form.description=this.value">${esc(state.form.description)}</textarea></div>
        <div class="fg2">
          <div class="form-group"><label class="form-label">Dotación de personal</label>
            <select class="form-input form-select" onchange="state.form.employee_count=this.value">
              <option value="">Seleccione</option>
              ${['1-10','11-50','51-200','201-500','500+'].map(v=>`<option value="${v}" ${state.form.employee_count===v?'selected':''}>${v} personas</option>`).join('')}
            </select></div>
          <div class="form-group"><label class="form-label">Sitio web</label><input class="form-input" value="${esc(state.form.website)}" placeholder="https://www.empresa.cl" oninput="state.form.website=this.value"/></div>
        </div>
      </div></div>`,

    contact: `<div class="onb-panel"><div class="onb-panel-hdr"><span class="onb-panel-icon">👤</span><div><div class="onb-panel-title">Datos de Contacto</div><div class="onb-panel-sub">Persona responsable del proceso de homologación</div></div></div>
      <div class="onb-panel-body">
        <div class="fg2">
          <div class="form-group"><label class="form-label">Nombre del contacto *</label><input class="form-input" value="${esc(state.form.contact_name)}" placeholder="Nombre completo" oninput="state.form.contact_name=this.value"/></div>
          <div class="form-group"><label class="form-label">Email *</label><input class="form-input" type="email" value="${esc(state.form.contact_email)}" placeholder="contacto@empresa.cl" oninput="state.form.contact_email=this.value"/></div>
        </div>
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" value="${esc(state.form.contact_phone)}" placeholder="+56 9 1234 5678" oninput="state.form.contact_phone=this.value"/></div>
      </div></div>`,

    coverage: `<div class="onb-panel"><div class="onb-panel-hdr"><span class="onb-panel-icon">🗺️</span><div><div class="onb-panel-title">Sectores y Cobertura Geográfica</div><div class="onb-panel-sub">Defina en qué sectores opera y qué regiones puede servir</div></div></div>
      <div class="onb-panel-body">
        <div class="form-group"><label class="form-label">Sectores en que opera *</label>
          <div class="tag-selector">${SECTORS.map(s=>`<div class="tag-opt${state.form.sectors.includes(s)?' on':''}" onclick="toggleArr('sectors','${s}',this)">${esc(s)}</div>`).join('')}</div></div>
        <div class="form-group" style="margin-top:14px"><label class="form-label">Regiones de cobertura *</label>
          <div class="tag-selector">${REGIONS.map(r=>`<div class="tag-opt${state.form.geo_coverage.includes(r)?' on':''}" onclick="toggleArr('geo_coverage','${esc(r)}',this)">${esc(r)}</div>`).join('')}</div></div>
      </div></div>`,

    ice: `<div class="onb-panel"><div class="onb-panel-hdr"><span class="onb-panel-icon">⭐</span><div><div class="onb-panel-title">Nivel de Homologación ICE</div><div class="onb-panel-sub">Seleccione el nivel objetivo que desea alcanzar</div></div></div>
      <div class="onb-panel-body">
        <p style="font-size:12px;color:var(--t2);margin-bottom:14px;line-height:1.6">El sistema ICE de BERISA clasifica proveedores en 5 niveles según su documentación y desempeño. Niveles superiores permiten participar en procesos de mayor envergadura.</p>
        <div class="ice-grid">${ICE_LEVELS.filter(l=>l.id!=='nivel_0').map(l=>`
          <div class="ice-card${state.form.target_level===l.id?' selected':''}" onclick="state.form.target_level='${l.id}';renderContent()">
            ${l.badge?`<span class="badge" style="background:${l.color}18;color:${l.color};border:1px solid ${l.color}44;font-size:8px;letter-spacing:.5px">${l.badge}</span>`:''}
            <div class="ico">${l.ico}</div>
            <div class="name" style="color:${l.color}">${l.name}</div>
            <div class="desc">${l.desc}</div>
          </div>`).join('')}
        </div>
      </div></div>`,

    docs: buildDocsStep(),

    review: buildReviewStep(),
  };
  document.getElementById('step-content').innerHTML=bodies[s.id]||'';
}

function buildDocsStep(){
  const level=state.form.target_level;
  const levelsToShow=['nivel_1','nivel_2','nivel_3','nivel_4'].slice(0,['nivel_1','nivel_2','nivel_3','nivel_4'].indexOf(level)+1);
  let html='';
  for(const lvl of levelsToShow){
    const meta=ICE_LEVELS.find(l=>l.id===lvl);
    const docs=DOCS_BY_LEVEL[lvl]||[];
    const doneCount=docs.filter(d=>state.docsDone[d.key]).length;
    html+=`<div class="onb-panel" style="margin-bottom:10px">
      <div class="onb-panel-hdr"><span class="onb-panel-icon">${meta.ico}</span>
        <div style="flex:1"><div class="onb-panel-title">${meta.name} — Documentos requeridos</div>
        <div class="onb-panel-sub">${doneCount}/${docs.length} cargados</div></div>
        <div class="progress-wrap"><svg class="progress-ring" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15" stroke="rgba(255,255,255,.08)" stroke-width="3" fill="none"/>
          <circle cx="18" cy="18" r="15" stroke="${meta.color}" stroke-width="3" fill="none"
            stroke-dasharray="${Math.round(doneCount/docs.length*94.2)} 94.2" stroke-dashoffset="23.55" transform="rotate(-90 18 18)"/>
          <text x="18" y="21" text-anchor="middle" font-size="9" font-family="Montserrat" fill="${meta.color}">${Math.round(doneCount/docs.length*100)}%</text>
        </svg></div>
      </div>
      <div class="onb-panel-body"><div class="checklist">
        ${docs.map(d=>{
          const done=!!state.docsDone[d.key];
          return`<div class="check-item ${done?'done':'pending'}">
            <div class="check-status ${done?'cs-done':'cs-pend'}">${done?'✓':'○'}</div>
            <div class="check-text">${esc(d.label)}</div>
            <span class="${d.required?'check-req':'check-opt'}">${d.required?'Requerido':'Opcional'}</span>
            <button class="upload-btn" onclick="simulateUpload('${d.key}','${esc(d.label)}')">${done?'✓ Cargado':'↑ Cargar'}</button>
          </div>`;
        }).join('')}
      </div></div>
    </div>`;
  }
  return html;
}

function buildReviewStep(){
  const f=state.form;
  const allDocs=Object.values(DOCS_BY_LEVEL).flat();
  const doneDocs=allDocs.filter(d=>state.docsDone[d.key]).length;
  const profilePct=pct();
  return`<div class="onb-panel"><div class="onb-panel-hdr"><span class="onb-panel-icon">✅</span>
    <div><div class="onb-panel-title">Revisión del Registro</div><div class="onb-panel-sub">Verifique su información antes de enviar</div></div>
    <div style="text-align:center">
      <div style="font-family:'Montserrat',sans-serif;font-size:32px;font-weight:700;color:var(--gold)">${profilePct}%</div>
      <div style="font-size:10px;color:var(--t3)">Perfil completo</div>
    </div>
  </div>
  <div class="onb-panel-body">
    <div class="ig2" style="margin-bottom:14px">
      <div class="mi"><label>Razón Social</label><div class="v">${esc(f.company_name||'—')}</div></div>
      <div class="mi"><label>RUT</label><div class="v">${esc(f.rut||'—')}</div></div>
      <div class="mi"><label>Contacto</label><div class="v">${esc(f.contact_name||'—')}</div></div>
      <div class="mi"><label>Email</label><div class="v">${esc(f.contact_email||'—')}</div></div>
      <div class="mi"><label>Sectores</label><div class="v" style="font-size:11px">${f.sectors.length?f.sectors.join(', '):'—'}</div></div>
      <div class="mi"><label>Cobertura</label><div class="v" style="font-size:11px">${f.geo_coverage.length?f.geo_coverage.slice(0,4).join(', ')+(f.geo_coverage.length>4?` +${f.geo_coverage.length-4}`:''):'—'}</div></div>
      <div class="mi"><label>Nivel objetivo</label><div class="v">${ICE_LEVELS.find(l=>l.id===f.target_level)?.name||'—'}</div></div>
      <div class="mi"><label>Documentos cargados</label><div class="v" style="color:${doneDocs>0?'var(--success)':'var(--danger)'}">${doneDocs} de ${allDocs.length}</div></div>
    </div>
    <div class="disc" role="note">
      <div class="di">ℹ️</div>
      <div class="dt">Su perfil quedará como <strong>Pendiente de revisión</strong>. El equipo BERISA validará la documentación en 2–3 días hábiles y le notificará por email. Los documentos obligatorios deben estar completos para avanzar de nivel.</div>
    </div>
  </div></div>`;
}

function toggleArr(key, val, el){
  const arr=state.form[key];
  const idx=arr.indexOf(val);
  if(idx>=0)arr.splice(idx,1);
  else arr.push(val);
  el.classList.toggle('on',arr.includes(val));
}

function simulateUpload(key, label){
  // In production: open file picker and POST to /api/v1/suppliers/:id/documents
  state.docsDone[key]=true;
  showToast(`"${label}" cargado correctamente`,'success');
  renderContent();
}

function goStep(i){ if(i>=0&&i<STEPS.length){state.cur=i;renderStepper();renderContent();} }
function nextStep(){
  if(state.cur===STEPS.length-1){ submitForm(); return; }
  // Basic validation
  if(state.cur===0&&!state.form.company_name){showToast('Ingrese la razón social','warning');return;}
  if(state.cur===1&&!state.form.contact_email){showToast('Ingrese el email de contacto','warning');return;}
  if(state.cur===2&&!state.form.sectors.length){showToast('Seleccione al menos un sector','warning');return;}
  state.cur++; renderStepper(); renderContent(); window.scrollTo({top:0,behavior:'smooth'});
}
function prevStep(){if(state.cur>0){state.cur--;renderStepper();renderContent();window.scrollTo({top:0,behavior:'smooth'});}}

function submitForm(){
  if(!state.form.company_name||!state.form.contact_email){
    showToast('Complete los campos obligatorios','error');return;
  }
  showToast('🎉 Registro enviado para revisión. Recibirá confirmación por email en 2–3 días hábiles.','success',6000);
  setTimeout(()=>window.location.replace('supplier-directory.html'),3000);
}

function showToast(msg,type='info',dur=3500){
  const i={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  const el=document.createElement('div');el.className=`toast toast-${type}`;
  el.innerHTML=`<span class="toast-icon">${i[type]||'ℹ️'}</span><span class="toast-msg">${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300)},dur);
}
document.getElementById('footYear').textContent=new Date().getFullYear();
renderStepper();renderContent();
</script>
</body></html>
