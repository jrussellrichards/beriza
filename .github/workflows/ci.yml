name: berisa-ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ENV_FILE
          script: |
            set -e

            # init+fetch+reset funciona aunque el directorio exista con archivos
            # (git clone falla si no está vacío — bug que rompía el bootstrap)
            mkdir -p /root/acredita
            cd /root/acredita
            if [ ! -d .git ]; then
              git init -q
              git remote add origin https://github.com/jrussellrichards/beriza.git
            fi
            git fetch origin main
            git reset --hard origin/main

            # Escribir .env desde GitHub Secret (después del reset)
            echo "$ENV_FILE" > /root/acredita/.env

            docker compose -f docker-compose.prod.yml --env-file .env up --build -d
            sleep 8
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker compose -f docker-compose.prod.yml exec -T backend python scripts/seed.py
        env:
          ENV_FILE: ${{ secrets.ENV }}
