services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: acredita
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: acredita
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://acredita:${DB_PASSWORD}@db:5432/acredita
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=60
      - FILE_STORAGE=${FILE_STORAGE:-local}
      - LOCAL_STORAGE_PATH=uploads
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-auto}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-Acredita <onboarding@resend.dev>}
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - VISION_LLM_API_KEY=${VISION_LLM_API_KEY:-}
      - VISION_LLM_MODEL=${VISION_LLM_MODEL:-}
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    restart: always
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://acredita:${DB_PASSWORD}@db:5432/acredita
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - JWT_SECRET=${JWT_SECRET}
      - FILE_STORAGE=${FILE_STORAGE:-local}
      - LOCAL_STORAGE_PATH=uploads
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-auto}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - VISION_LLM_API_KEY=${VISION_LLM_API_KEY:-}
      - VISION_LLM_MODEL=${VISION_LLM_MODEL:-}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  uploads_data:
